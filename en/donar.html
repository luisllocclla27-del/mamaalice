    <!-- NGO Schema.org -->

    {
      "@context": "https://schema.org",
      "@type": "NGO",
      "name": "ONG Mama Alice",
      "url": "https://mamaalice.org",
      "logo": "https://mamaalice.org/assets/images/logo-oficial.webp",
      "description": "Transformamos la vida de niños y adolescentes en Ayacucho a través de educación, soporte emocional y formación técnica.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Ayacucho",
        "addressCountry": "PE"
      }
    }

</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Minimal fixed header for donation page -->
    <header class="header header--scrolled" style="position:sticky;top:0;">
        <div class="container nav-container">
            <a href="index.html" class="logo" aria-label="Mama Alice — Home">
                <img src="../assets/images/logo-transparent.webp" alt="Mama Alice NGO" class="logo-oficial-img" width="120" height="85" / fetchpriority="high" loading="eager">
            </a>
            <a href="index.html" class="btn btn--outline-dark btn--sm">← Back to site</a>
        </div>
    </header>

    <main id="main-content" style="background-color:#f8f9fa; min-height:100vh; padding:120px 20px 60px; display:flex; justify-content:center; align-items:flex-start; font-family:var(--font-body, 'Inter', sans-serif);">
        
        <div style="width:100%; max-width:520px; background:white; border-radius:24px; box-shadow:0 12px 40px rgba(0,0,0,0.08); overflow:hidden; position:relative;">
            
            <!-- Header of the Card -->
            <div style="background:var(--primary); padding:40px 32px 32px; color:white; text-align:center;">
                <h1 style="font-family:var(--font-heading); font-size:2rem; font-weight:600; margin-bottom:8px; line-height:1.2;">Donate to Mama Alice: Your contribution changes lives</h1>
                <p style="font-size:0.95rem; opacity:0.9; margin:0; font-weight:400;">Support education in Ayacucho safely.</p>
            </div>

            <div style="padding:40px 32px;">
                <form onsubmit="event.preventDefault();alert('Thank you for your generosity! This is a demo version.');">
                    
                    <!-- Frequency Toggle -->
                    <div style="display:flex; background:#f1f3f5; border-radius:12px; padding:6px; margin-bottom:32px;">
                        <div class="freq-option active checkout-toggle" tabindex="0" onclick="selectFreq(this)">One-time Donation</div>
                        <div class="freq-option checkout-toggle" tabindex="0" onclick="selectFreq(this)">Monthly ❤️</div>
                    </div>

                    <!-- Price Anchors -->
                    <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; margin-bottom:32px;">
                        <div class="price-anchor checkout-price" tabindex="0" onclick="selectDonation(this)">
                            <div class="amount">€15</div>
                            <div class="impact">Materials</div>
                        </div>
                        <div class="price-anchor selected checkout-price" tabindex="0" onclick="selectDonation(this)">
                            <div class="amount">€50</div>
                            <div class="impact">Training</div>
                        </div>
                        <div class="price-anchor checkout-price" tabindex="0" onclick="selectDonation(this)">
                            <div class="amount">€100</div>
                            <div class="impact">Full Scholarship</div>
                        </div>
                    </div>

                    <!-- Custom Amount / Slider Area -->
                    <div style="margin-bottom:40px; padding-bottom:32px; border-bottom:1px solid #e9ecef;">
                        <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px;">
                            <label for="donation-slider" style="font-size:0.9rem; font-weight:600; color:#495057; margin:0;">Customize your amount</label>
                            <div style="font-family:var(--font-heading); font-size:1.6rem; color:var(--primary); font-weight:700;">€<span id="slider-val">50</span></div>
                        </div>
                        <input type="range" id="donation-slider" min="5" max="250" step="5" value="50" style="width:100%; height:6px; background:#e9ecef; border-radius:10px; accent-color:var(--primary); cursor:pointer; margin-bottom:12px;" />
                        <div style="font-size:0.85rem; color:#6c757d; font-style:italic; text-align:center;">
                            ✨ <span id="slider-impact">1 month of technical training.</span>
                        </div>
                    </div>


                    <!-- Personal Info -->
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                        <div>
                            <label class="checkout-label">First Name</label>
                            <input type="text" class="checkout-input" placeholder="e.g. Anna" required />
                        </div>
                        <div>
                            <label class="checkout-label">Last Name</label>
                            <input type="text" class="checkout-input" placeholder="e.g. Garcia" required />
                        </div>
                    </div>

                    <label class="checkout-label">Email Address</label>
                    <input type="email" class="checkout-input" placeholder="anna@email.com" required />

                    <label class="checkout-label">Card Details <span style="font-weight:normal;color:#adb5bd;float:right;">Secure Test</span></label>
                    <div style="display:flex; flex-direction:column; gap:0;">
                        <input type="text" class="checkout-input" placeholder="0000 0000 0000 0000" style="border-bottom-left-radius:0; border-bottom-right-radius:0;" required />
                        <div style="display:flex;">
                            <input type="text" class="checkout-input" placeholder="MM/YY" style="flex:1; border-top-left-radius:0; border-top-right-radius:0; border-top:none; border-right:none;" required />
                            <input type="text" class="checkout-input" placeholder="CVC" style="flex:1; border-top-left-radius:0; border-top-right-radius:0; border-top:none;" required />
                        </div>
                    </div>

                    <button type="submit" style="width:100%; background:var(--primary); color:white; border:none; padding:18px; font-size:1.1rem; font-weight:600; border-radius:8px; cursor:pointer; margin-top:32px; transition:all 0.2s; box-shadow:0 4px 12px rgba(46,155,138,0.2);">
                        Make a Secure Donation
                    </button>

                    <div style="margin-top:24px; text-align:center; font-size:0.85rem; color:#6c757d; display:flex; align-items:center; justify-content:center; gap:8px;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        Your data is encrypted and protected (256-bit SSL).
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const slider = document.getElementById('donation-slider');
            const valDisplay = document.getElementById('slider-val');
            const impactDisplay = document.getElementById('slider-impact');
            
            if(slider) {
                slider.addEventListener('input', (e) => {
                    const val = parseInt(e.target.value);
                    valDisplay.textContent = val;
                    
                    document.querySelectorAll('.price-anchor').forEach(el => {
                        el.classList.remove('selected');
                    });
                    
                    if(val < 25) {
                        impactDisplay.textContent = "School materials and basic support.";
                    } else if(val < 50) {
                        impactDisplay.textContent = "Psychological therapies for a young person.";
                    } else if(val < 100) {
                        impactDisplay.textContent = "1 month of technical training.";
                    } else if(val < 150) {
                        impactDisplay.textContent = "Full scholarship (education, food, transport).";
                    } else {
                        impactDisplay.textContent = "Profound impact on multiple young people.";
                    }
                });
            }
        });

        function selectDonation(element) {
            document.querySelectorAll('.price-anchor').forEach(el => {
                el.classList.remove('selected');
                el.setAttribute('aria-checked', 'false');
            });
            element.classList.add('selected');
            element.setAttribute('aria-checked', 'true');
            // Sync Slider
            const slider = document.getElementById('donation-slider');
            const valDisplay = document.getElementById('slider-val');
            if(slider) {
                const textAmt = element.querySelector('.amount').textContent.replace('€', '');
                slider.value = textAmt;
                valDisplay.textContent = textAmt;
                slider.dispatchEvent(new Event('input'));
            }
        }
        function selectFreq(element) {
            element.closest('.freq-toggle').querySelectorAll('.freq-option').forEach(el => {
                el.classList.remove('active');
                el.setAttribute('aria-checked', 'false');
            });
            element.classList.add('active');
            element.setAttribute('aria-checked', 'true');
        }
    </script>
    <script src="../js/main.js"></script>
<script>
(function(){
    if(document.getElementById('scrollTopBtn')) return;
    const btn = document.createElement('button');
    btn.id = 'scrollTopBtn';
    btn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>';
    btn.style.cssText = 'position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background-color:#2e9b8a;color:white;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2147483647;opacity:0;visibility:hidden;transform:translateY(20px);transition:all 0.3s ease-out;box-shadow:0 10px 25px rgba(46,155,138,0.5);';
    document.body.appendChild(btn);
    btn.addEventListener('mouseenter', () => { btn.style.backgroundColor = '#237a6c'; btn.style.transform = 'translateY(-5px)'; });
    btn.addEventListener('mouseleave', () => { btn.style.backgroundColor = '#2e9b8a'; btn.style.transform = 'translateY(0)'; });
    btn.addEventListener('click', () => { window.lenis ? window.lenis.scrollTo(0) : window.scrollTo({top:0,behavior:'smooth'}); });
    const chk = () => {
        const y = window.scrollY || document.documentElement.scrollTop || document.body.scrollTop || 0;
        if(y > 50) { btn.style.opacity='1'; btn.style.visibility='visible'; btn.style.transform='translateY(0)'; }
        else { btn.style.opacity='0'; btn.style.visibility='hidden'; btn.style.transform='translateY(20px)'; }
    };
    window.addEventListener('scroll', chk, {passive:true});
    setInterval(chk, 250);
    chk();
})();
</script>
</body>
</html>
