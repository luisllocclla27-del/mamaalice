<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="view-transition" content="same-origin" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada | ONG Mama Alice</title>
    <meta name="description" content="La página que buscas no existe. Vuelve al inicio de Mama Alice.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,800;1,9..144,500&amp;family=Inter:wght@400;500;600&amp;display=swap">
    <link rel="stylesheet" href="css/styles.min.css?v=22">
    <style>
        body {
            background: var(--primary-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
            overflow: hidden;
        }

        /* Animated background circles */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            animation: float 8s ease-in-out infinite;
        }
        .bg-orb-1 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(230,126,34,0.08) 0%, transparent 70%);
            top: -200px; right: -200px;
            animation-delay: 0s;
        }
        .bg-orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(15,43,74,0.6) 0%, transparent 70%);
            bottom: -100px; left: -100px;
            animation-delay: -4s;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50%       { transform: translateY(-20px) scale(1.05); }
        }

        .error-container {
            position: relative;
            z-index: 1;
            max-width: 560px;
        }

        .error-code {
            font-family: var(--font-heading);
            font-size: clamp(7rem, 20vw, 12rem);
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(230,126,34,0.4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -4px;
            user-select: none;
        }

        .error-divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            border-radius: 2px;
            margin: 0 auto 28px;
        }

        .error-title {
            font-family: var(--font-heading);
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            color: white;
            margin-bottom: 16px;
            font-weight: 700;
        }

        .error-description {
            font-size: 1.05rem;
            color: rgba(255,255,255,0.6);
            line-height: 1.8;
            margin-bottom: 40px;
        }

        .error-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 60px;
        }

        /* Quick links */
        .quick-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            padding-top: 32px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .quick-link-item {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            padding: 6px 16px;
            border-radius: var(--radius-full);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s ease;
        }
        .quick-link-item:hover {
            color: white;
            border-color: rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.05);
        }

        /* Override btn styles for dark bg */
        .btn--outline-white {
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            background: transparent;
            border-radius: var(--radius-full);
            padding: 14px 32px;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.25s ease;
            text-decoration: none;
        }
        .btn--outline-white:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.5);
            transform: translateY(-2px);
        }

        /* Illustration */
        .illustration {
            font-size: 5rem;
            margin-bottom: 24px;
            display: block;
            animation: wiggle 3s ease-in-out infinite;
        }
        @keyframes wiggle {
            0%, 100% { transform: rotate(-3deg); }
            50%       { transform: rotate(3deg); }
        }
    </style>

    <script>
        // Redirect to English 404 if the path was inside /en/
        if (window.location.pathname.startsWith('/en/')) {
            window.location.replace('/en/404.html');
        }
    </script>

    <!-- SEO & Languages -->
    <link rel="alternate" hreflang="es" href="https://mama-alice-ivory.vercel.app/404.html" />
    <link rel="alternate" hreflang="en" href="https://mama-alice-ivory.vercel.app/en/404.html" />
    <link rel="alternate" hreflang="x-default" href="https://mama-alice-ivory.vercel.app/404.html" />

    <!-- NGO Schema.org -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "NGO",
      "name": "ONG Mama Alice",
      "url": "https://mamaalice.org",
      "logo": "https://mamaalice.org/assets/images/logo-oficial.webp",
      "description": "Transformamos la vida de niños y adolescentes en Ayacucho a través de educación, soporte emocional y formación técnica.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Ayacucho",
        "addressCountry": "PE"
      }
    }
    </script>
</head>
<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <div class="error-container">
        <span class="illustration" role="img" aria-label="Mapa con pin">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon><line x1="9" y1="3" x2="9" y2="18"></line><line x1="15" y1="6" x2="15" y2="21"></line></svg>
        </span>

        <div class="error-code" aria-label="Error 404">404</div>
        <div class="error-divider"></div>

        <h1 class="error-title">Página no encontrada</h1>
        <p class="error-description">
            Parece que esta ruta no lleva a ninguna comunidad.
            La página que buscas puede haberse movido o ya no existe.
        </p>

        <div class="error-actions">
            <a href="index.html" class="btn btn--primary btn--lg">
                ← Volver al inicio
            </a>
            <a href="#" onclick="event.preventDefault(); window.toggleDonationDrawer()" class="btn--outline-white">
                Hacer una donación
            </a>
        </div>

        <nav class="quick-links" aria-label="Links rápidos">
            <a href="nosotros.html"      class="quick-link-item">Nosotros</a>
            <a href="comunidades.html"   class="quick-link-item">Proyectos</a>
            <a href="hospitality.html"   class="quick-link-item">Hospitality</a>
            <a href="transparencia.html" class="quick-link-item">Transparencia</a>
            <a href="mailto:info@mamaalice.org" class="quick-link-item">Contacto</a>
        </nav>
    </div>

    <script>
        // Auto-redirect after 15 seconds
        let countdown = 15;
        const interval = setInterval(() => {
            countdown--;
            if (countdown <= 0) {
                clearInterval(interval);
                window.location.href = 'index.html';
            }
        }, 1000);
    </script>
<script>
(function(){
    if(document.getElementById('scrollTopBtn')) return;
    const btn = document.createElement('button');
    btn.id = 'scrollTopBtn';
    btn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>';
    btn.style.cssText = 'position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background-color:#2e9b8a;color:white;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2147483647;opacity:0;visibility:hidden;transform:translateY(20px);transition:all 0.3s ease-out;box-shadow:0 10px 25px rgba(46,155,138,0.5);';
    document.body.appendChild(btn);
    btn.addEventListener('mouseenter', () => { btn.style.backgroundColor = '#237a6c'; btn.style.transform = 'translateY(-5px)'; });
    btn.addEventListener('mouseleave', () => { btn.style.backgroundColor = '#2e9b8a'; btn.style.transform = 'translateY(0)'; });
    btn.addEventListener('click', () => { window.lenis ? window.lenis.scrollTo(0) : window.scrollTo({top:0,behavior:'smooth'}); });
    const chk = () => {
        const y = window.scrollY || document.documentElement.scrollTop || document.body.scrollTop || 0;
        if(y > 50) { btn.style.opacity='1'; btn.style.visibility='visible'; btn.style.transform='translateY(0)'; }
        else { btn.style.opacity='0'; btn.style.visibility='hidden'; btn.style.transform='translateY(20px)'; }
    };
    window.addEventListener('scroll', chk, {passive:true});
    setInterval(chk, 250);
    chk();
})();
</script>
</body>
</html>
