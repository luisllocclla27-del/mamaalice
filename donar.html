<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donar | ONG Mama Alice</title>
    <meta name="description" content="Haz tu donación segura a Mama Alice. €15 cubren materiales escolares. €50 cubren un mes de formación técnica. €100 cubren una beca completa." />
    <meta property="og:title" content="Donar | ONG Mama Alice" />
    <meta property="og:description" content="Haz tu donación segura a Mama Alice y transforma el futuro de un joven en Ayacucho, Perú." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tu-dominio-aqui.org/donar.html" />
    <meta property="og:site_name" content="ONG Mama Alice" />
    <meta property="og:locale" content="es_PE" />
    <meta property="og:image" content="https://tu-dominio-aqui.org/assets/images/logo-oficial.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://tu-dominio-aqui.org/donar.html" />
    <meta name="theme-color" content="#F5A420" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,800;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
    <a href="#main-content" class="skip-link">Saltar al contenido principal</a>

    <!-- Minimal header fijo para página de donación -->
    <header class="header header--scrolled" style="position:sticky;top:0;">
        <div class="container nav-container">
            <a href="index.html" class="logo" aria-label="Mama Alice — Inicio">
                <img src="assets/images/logo-transparent.png"
                     alt="Mama Alice ONG"
                     class="logo-oficial-img"
                     width="120" height="85"
                     loading="eager" />
            </a>
            <a href="index.html" class="btn btn--outline-dark btn--sm">← Volver al sitio</a>
        </div>
    </header>

    <main id="main-content" style="background-color:#f8f9fa; min-height:100vh; padding:120px 20px 60px; display:flex; justify-content:center; align-items:flex-start; font-family:var(--font-body, 'Inter', sans-serif);">
        
        <div style="width:100%; max-width:520px; background:white; border-radius:24px; box-shadow:0 12px 40px rgba(0,0,0,0.08); overflow:hidden; position:relative;">
            
            <!-- Header of the Card -->
            <div style="background:var(--primary); padding:40px 32px 32px; color:white; text-align:center;">
                <h1 style="font-family:var(--font-heading); font-size:2rem; font-weight:600; margin-bottom:8px; line-height:1.2;">Tu aporte cambia vidas</h1>
                <p style="font-size:0.95rem; opacity:0.9; margin:0; font-weight:400;">Apoya la educación en Ayacucho de forma segura.</p>
            </div>

            <div style="padding:40px 32px;">
                <form onsubmit="event.preventDefault();alert('¡Gracias por tu generosidad! Esta es una versión demostrativa.');">
                    
                    <!-- Frequency Toggle -->
                    <div style="display:flex; background:#f1f3f5; border-radius:12px; padding:6px; margin-bottom:32px;">
                        <div class="freq-option active checkout-toggle" tabindex="0" onclick="selectFreq(this)">Donación Única</div>
                        <div class="freq-option checkout-toggle" tabindex="0" onclick="selectFreq(this)">Mensual ❤️</div>
                    </div>

                    <!-- Price Anchors -->
                    <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; margin-bottom:32px;">
                        <div class="price-anchor checkout-price" tabindex="0" onclick="selectDonation(this)">
                            <div class="amount">€15</div>
                            <div class="impact">Materiales</div>
                        </div>
                        <div class="price-anchor selected checkout-price" tabindex="0" onclick="selectDonation(this)">
                            <div class="amount">€50</div>
                            <div class="impact">Formación</div>
                        </div>
                        <div class="price-anchor checkout-price" tabindex="0" onclick="selectDonation(this)">
                            <div class="amount">€100</div>
                            <div class="impact">Beca Total</div>
                        </div>
                    </div>

                    <!-- Custom Amount / Slider Area -->
                    <div style="margin-bottom:40px; padding-bottom:32px; border-bottom:1px solid #e9ecef;">
                        <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px;">
                            <label for="donation-slider" style="font-size:0.9rem; font-weight:600; color:#495057; margin:0;">Personaliza tu monto</label>
                            <div style="font-family:var(--font-heading); font-size:1.6rem; color:var(--primary); font-weight:700;">€<span id="slider-val">50</span></div>
                        </div>
                        <input type="range" id="donation-slider" min="5" max="250" step="5" value="50" style="width:100%; height:6px; background:#e9ecef; border-radius:10px; accent-color:var(--primary); cursor:pointer; margin-bottom:12px;" />
                        <div style="font-size:0.85rem; color:#6c757d; font-style:italic; text-align:center;">
                            ✨ <span id="slider-impact">1 mes de formación técnica.</span>
                        </div>
                    </div>

                    <style>
                        .checkout-toggle {
                            flex: 1;
                            text-align: center;
                            padding: 10px 16px;
                            border-radius: 8px;
                            font-size: 0.9rem;
                            font-weight: 600;
                            color: #495057;
                            cursor: pointer;
                            transition: all 0.2s ease;
                        }
                        .checkout-toggle.active {
                            background: white;
                            color: var(--primary);
                            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
                        }
                        .checkout-price {
                            border: 2px solid #e9ecef;
                            padding: 16px 8px;
                            text-align: center;
                            border-radius: 12px;
                            cursor: pointer;
                            transition: all 0.2s ease;
                            background: white;
                        }
                        .checkout-price:hover {
                            border-color: #ced4da;
                        }
                        .checkout-price.selected {
                            border-color: var(--primary);
                            background: rgba(46,155,138,0.04);
                        }
                        .checkout-price .amount {
                            font-family: var(--font-heading);
                            font-size: 1.5rem;
                            font-weight: 700;
                            color: #212529;
                            margin-bottom: 4px;
                        }
                        .checkout-price.selected .amount {
                            color: var(--primary);
                        }
                        .checkout-price .impact {
                            font-size: 0.75rem;
                            color: #6c757d;
                            font-weight: 500;
                        }
                        .checkout-input {
                            width: 100%;
                            padding: 14px 16px;
                            border: 1px solid #ced4da;
                            border-radius: 8px;
                            font-size: 1rem;
                            color: #212529;
                            background: #fff;
                            transition: all 0.2s ease;
                            font-family: var(--font-body);
                        }
                        .checkout-input:focus {
                            outline: none;
                            border-color: var(--primary);
                            box-shadow: 0 0 0 3px rgba(46,155,138,0.15);
                        }
                        .checkout-input::placeholder {
                            color: #adb5bd;
                        }
                        .checkout-label {
                            display: block;
                            font-size: 0.85rem;
                            font-weight: 600;
                            color: #495057;
                            margin-bottom: 8px;
                            margin-top: 20px;
                        }
                    </style>

                    <!-- Personal Info -->
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                        <div>
                            <label class="checkout-label">Nombre</label>
                            <input type="text" class="checkout-input" placeholder="Ej. Ana" required />
                        </div>
                        <div>
                            <label class="checkout-label">Apellido</label>
                            <input type="text" class="checkout-input" placeholder="Ej. García" required />
                        </div>
                    </div>

                    <label class="checkout-label">Correo Electrónico</label>
                    <input type="email" class="checkout-input" placeholder="ana@correo.com" required />

                    <label class="checkout-label">Datos de Tarjeta <span style="font-weight:normal;color:#adb5bd;float:right;">Prueba Segura</span></label>
                    <div style="display:flex; flex-direction:column; gap:0;">
                        <input type="text" class="checkout-input" placeholder="0000 0000 0000 0000" style="border-bottom-left-radius:0; border-bottom-right-radius:0;" required />
                        <div style="display:flex;">
                            <input type="text" class="checkout-input" placeholder="MM/AA" style="flex:1; border-top-left-radius:0; border-top-right-radius:0; border-top:none; border-right:none;" required />
                            <input type="text" class="checkout-input" placeholder="CVC" style="flex:1; border-top-left-radius:0; border-top-right-radius:0; border-top:none;" required />
                        </div>
                    </div>

                    <button type="submit" style="width:100%; background:var(--primary); color:white; border:none; padding:18px; font-size:1.1rem; font-weight:600; border-radius:8px; cursor:pointer; margin-top:32px; transition:all 0.2s; box-shadow:0 4px 12px rgba(46,155,138,0.2);">
                        Hacer Donación Segura
                    </button>

                    <div style="margin-top:24px; text-align:center; font-size:0.85rem; color:#6c757d; display:flex; align-items:center; justify-content:center; gap:8px;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        Tus datos están encriptados y protegidos (SSL de 256 bits).
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const slider = document.getElementById('donation-slider');
            const valDisplay = document.getElementById('slider-val');
            const impactDisplay = document.getElementById('slider-impact');
            
            if(slider) {
                slider.addEventListener('input', (e) => {
                    const val = parseInt(e.target.value);
                    valDisplay.textContent = val;
                    
                    document.querySelectorAll('.price-anchor').forEach(el => {
                        el.classList.remove('selected');
                    });
                    
                    if(val < 25) {
                        impactDisplay.textContent = "Materiales escolares y apoyo básico.";
                    } else if(val < 50) {
                        impactDisplay.textContent = "Terapias psicológicas para un joven.";
                    } else if(val < 100) {
                        impactDisplay.textContent = "1 mes de formación técnica.";
                    } else if(val < 150) {
                        impactDisplay.textContent = "Beca completa (educación, comida, pasajes).";
                    } else {
                        impactDisplay.textContent = "Impacto profundo en múltiples jóvenes.";
                    }
                });
            }
        });

        function selectDonation(element) {
            document.querySelectorAll('.price-anchor').forEach(el => {
                el.classList.remove('selected');
                el.setAttribute('aria-checked', 'false');
            });
            element.classList.add('selected');
            element.setAttribute('aria-checked', 'true');
            // Sync Slider
            const slider = document.getElementById('donation-slider');
            const valDisplay = document.getElementById('slider-val');
            if(slider) {
                const textAmt = element.querySelector('.amount').textContent.replace('€', '');
                slider.value = textAmt;
                valDisplay.textContent = textAmt;
                slider.dispatchEvent(new Event('input'));
            }
        }
        function selectFreq(element) {
            element.closest('.freq-toggle').querySelectorAll('.freq-option').forEach(el => {
                el.classList.remove('active');
                el.setAttribute('aria-checked', 'false');
            });
            element.classList.add('active');
            element.setAttribute('aria-checked', 'true');
        }
    </script>
    <script src="js/main.js"></script>
</body>
</html>
